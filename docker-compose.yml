version: '3.8'

services:
  # Vutler API (AI Agent runtime, LLM router, task queue)
  vutler-api:
    build:
      context: ./app/custom
      dockerfile: Dockerfile
    container_name: vutler-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      # JWT Secret (required)
      - JWT_SECRET=${JWT_SECRET}
      - VAULTBRIX_PASSWORD=${VAULTBRIX_PASSWORD}
      # PostgreSQL connection (Vaultbrix)
      - DATABASE_URL=${DATABASE_URL}
      # LLM Provider API Keys
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      # Email integration (Postal)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@vutler.ai}
      # Synology Drive integration
      - SYNOLOGY_URL=${SYNOLOGY_URL:-}
      - SYNOLOGY_USER=${SYNOLOGY_USER:-}
      - SYNOLOGY_PASS=${SYNOLOGY_PASS:-}
      # Vutler config
      - VUTLER_AGENT_RATE_LIMIT=${VUTLER_AGENT_RATE_LIMIT:-10}
      - VUTLER_MAX_TOKENS_PER_DAY=${VUTLER_MAX_TOKENS_PER_DAY:-1000000}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - vutler-network

  # Redis (cache, pub/sub, task queues, rate limiting)
  redis:
    image: redis:7-alpine
    container_name: vutler-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - vutler-network

  # Nginx (optional — reverse proxy for SSL termination)
  nginx:
    image: nginx:alpine
    container_name: vutler-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/ssl:/etc/nginx/ssl:ro
    depends_on:
      - vutler-api
    networks:
      - vutler-network
    profiles:
      - with-nginx  # Optional service, start with: docker-compose --profile with-nginx up

networks:
  vutler-network:
    driver: bridge

volumes:
  redis-data:
